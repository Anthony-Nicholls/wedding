<script>
  (function () {
    const nav = document.querySelector(".nav");
    const menu = document.querySelector(".nav-links");
    const toggle = document.querySelector(".nav-toggle");
    if (!nav || !menu || !toggle) {
      return;
    }

    const links = document.querySelectorAll(".nav-links a");
    let syncIndicator = null;

    function setOpen(open) {
      nav.classList.toggle("is-open", open);
      toggle.setAttribute("aria-expanded", open);
      toggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
    }

    function updateNavMode() {
      nav.classList.remove("nav--expanded", "nav--compact");
      nav.classList.add("is-measuring");

      const navStyle = getComputedStyle(nav);
      const menuStyle = getComputedStyle(menu);
      const paddingX =
        parseFloat(navStyle.paddingLeft) + parseFloat(navStyle.paddingRight);
      const gap = parseFloat(menuStyle.columnGap) || 0;
      const toggleWidth = toggle.getBoundingClientRect().width;
      const items = menu.querySelectorAll("a");

      let linksWidth = 0;
      items.forEach(function (item, index) {
        linksWidth += item.getBoundingClientRect().width;
        if (index > 0) {
          linksWidth += gap;
        }
      });

      const available = nav.clientWidth - paddingX - toggleWidth - gap;
      const needsCompact = linksWidth > available;

      nav.classList.remove("is-measuring");
      nav.classList.add(needsCompact ? "nav--compact" : "nav--expanded");

      if (!needsCompact) {
        setOpen(false);
      }

      if (typeof syncIndicator === "function") {
        syncIndicator();
      }
    }

    toggle.addEventListener("click", function () {
      setOpen(!nav.classList.contains("is-open"));
    });

    links.forEach(function (link) {
      link.addEventListener("click", function () {
        setOpen(false);
      });
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        setOpen(false);
      }
    });

    updateNavMode();
    new ResizeObserver(updateNavMode).observe(nav);
    window.addEventListener("load", updateNavMode);
    window.addEventListener("orientationchange", updateNavMode);
    window.addEventListener("pageshow", updateNavMode);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateNavMode);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(updateNavMode);
    }

    const sectionLinks = Array.prototype.slice
      .call(links)
      .map(function (link) {
        const id = link.getAttribute("href");
        if (!id || id.charAt(0) !== "#") {
          return null;
        }
        const section = document.getElementById(id.slice(1));
        if (!section) {
          return null;
        }
        return { link: link, section: section };
      })
      .filter(Boolean);

    if (sectionLinks.length) {
      let activeId = null;
      const indicator = document.createElement("span");
      indicator.className = "nav-indicator";
      indicator.setAttribute("aria-hidden", "true");
      menu.appendChild(indicator);

      function moveIndicator(link, immediate) {
        if (!link || nav.classList.contains("nav--compact")) {
          indicator.classList.remove("is-visible");
          return;
        }

        const menuRect = menu.getBoundingClientRect();
        const linkRect = link.getBoundingClientRect();
        const left = linkRect.left - menuRect.left + menu.scrollLeft;
        const width = linkRect.width;

        if (immediate) {
          indicator.style.transition = "none";
        }

        indicator.style.width = width + "px";
        indicator.style.transform = "translateX(" + left + "px)";
        indicator.classList.add("is-visible");

        if (immediate) {
          void indicator.offsetWidth;
          indicator.style.transition = "";
        }
      }

      function setActive(id, immediate) {
        if (activeId === id && !immediate) {
          return;
        }
        activeId = id;
        let activeLink = null;
        sectionLinks.forEach(function (item) {
          const isActive = item.section.id === id;
          item.link.classList.toggle("is-active", isActive);
          if (isActive) {
            item.link.setAttribute("aria-current", "true");
            activeLink = item.link;
          } else {
            item.link.removeAttribute("aria-current");
          }
        });
        moveIndicator(activeLink, immediate);
      }

      const visibleIds = new Set();

      function updateActiveFromVisible() {
        if (!visibleIds.size) {
          return;
        }

        let nextId = null;
        let bestDistance = Infinity;
        const marker = window.innerHeight * 0.3;

        sectionLinks.forEach(function (item) {
          if (!visibleIds.has(item.section.id)) {
            return;
          }
          const top = item.section.getBoundingClientRect().top;
          const distance = Math.abs(top - marker);
          if (distance < bestDistance) {
            bestDistance = distance;
            nextId = item.section.id;
          }
        });

        if (nextId) {
          setActive(nextId);
        }
      }

      const observer = new IntersectionObserver(
        function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              visibleIds.add(entry.target.id);
            } else {
              visibleIds.delete(entry.target.id);
            }
          });
          updateActiveFromVisible();
        },
        {
          rootMargin: "-25% 0px -45% 0px",
          threshold: [0, 0.1, 0.25, 0.5, 0.75, 1],
        }
      );

      sectionLinks.forEach(function (item) {
        observer.observe(item.section);
      });

      syncIndicator = function () {
        if (!activeId) {
          return;
        }
        const active = sectionLinks.find(function (item) {
          return item.section.id === activeId;
        });
        if (active) {
          moveIndicator(active.link, true);
        }
      };

      new ResizeObserver(syncIndicator).observe(menu);
      window.addEventListener("load", syncIndicator);
    }
  })();

  (function () {
    const countdown = document.querySelector(".countdown");
    if (!countdown) {
      return;
    }

    const weddingDate = new Date(countdown.dataset.weddingDate);
    const message = countdown.querySelector(".countdown-message");
    const values = {
      days: countdown.querySelector('[data-unit="days"]'),
      hours: countdown.querySelector('[data-unit="hours"]'),
      minutes: countdown.querySelector('[data-unit="minutes"]'),
      seconds: countdown.querySelector('[data-unit="seconds"]'),
    };

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = Date.now();
      const diff = weddingDate.getTime() - now;

      if (diff <= 0) {
        countdown.classList.add("is-complete");
        message.hidden = false;
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      values.days.textContent = days;
      values.hours.textContent = pad(hours);
      values.minutes.textContent = pad(minutes);
      values.seconds.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  })();

  (function () {
    const form = document.getElementById("donation-form");
    const root = document.getElementById("messages");
    const list = document.getElementById("donations-list");
    const thanks = document.getElementById("donation-thanks");
    const messagesTitle = document.getElementById("messages-title");
    const status = document.getElementById("donation-form-status");
    const submit = document.getElementById("donation-submit");
    const messageField = document.getElementById("donation-message");

    const apiUrl =
      (form && form.dataset.donationsApi) ||
      (root && root.dataset.donationsApi);
    if (!apiUrl) {
      return;
    }

    const donated = /[?&]donated=1(?:&|$)/.test(window.location.search);

    if (donated && root) {
      root.hidden = false;
      if (messagesTitle) {
        messagesTitle.hidden = true;
      }
      if (thanks) {
        thanks.hidden = false;
      }
      window.setTimeout(function () {
        root.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setStatus(text, isError) {
      if (!status) {
        return;
      }
      if (!text) {
        status.hidden = true;
        status.textContent = "";
        status.classList.remove("is-error");
        return;
      }
      status.hidden = false;
      status.textContent = text;
      status.classList.toggle("is-error", Boolean(isError));
    }

    function renderDonations(donations) {
      if (!root || !list) {
        return;
      }

      const items = (donations || []).filter(function (donation) {
        return donation && (donation.message || donation.from);
      });

      if (!items.length) {
        list.innerHTML = "";
        if (!donated) {
          root.hidden = true;
        }
        return;
      }

      list.innerHTML = items
        .map(function (donation) {
          const parts = [];
          if (donation.message) {
            parts.push(
              '<p class="donation-message">' +
                escapeHtml(donation.message) +
                "</p>"
            );
          }

          if (donation.from) {
            parts.push(
              '<p class="donation-meta"><span class="donation-from">' +
                escapeHtml(donation.from) +
                "</span></p>"
            );
          }

          return '<li class="donation">' + parts.join("") + "</li>";
        })
        .join("");

      root.hidden = false;
    }

    fetch(apiUrl, { credentials: "omit" })
      .then(function (response) {
        if (!response.ok) {
          throw new Error("Donations request failed");
        }
        return response.json();
      })
      .then(function (payload) {
        renderDonations(payload.donations);
      })
      .catch(function () {
        if (root && !donated) {
          root.hidden = true;
        }
      });

    if (!form) {
      return;
    }

    form.querySelectorAll(".emoji-btn").forEach(function (button) {
      button.addEventListener("click", function () {
        if (!messageField) {
          return;
        }
        const emoji = button.getAttribute("data-emoji") || "";
        const start = messageField.selectionStart;
        const end = messageField.selectionEnd;
        const value = messageField.value;
        messageField.value =
          value.slice(0, start) + emoji + value.slice(end);
        const cursor = start + emoji.length;
        messageField.focus();
        messageField.setSelectionRange(cursor, cursor);
      });
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      setStatus("");

      const amount = Number(form.amount.value);
      const name = String(form.name.value || "").trim();
      const message = String(form.message.value || "").trim();

      if (!name) {
        setStatus("Please enter your name.", true);
        form.name.focus();
        return;
      }
      if (!message) {
        setStatus("Please enter a note.", true);
        form.message.focus();
        return;
      }
      if (!Number.isFinite(amount) || amount < 1) {
        setStatus("Please enter an amount of at least £1.", true);
        form.amount.focus();
        return;
      }

      if (submit) {
        submit.disabled = true;
        submit.textContent = "Redirecting…";
      }

      fetch(apiUrl.replace(/\/$/, "") + "/donate", {
        method: "POST",
        credentials: "omit",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          amount: amount,
          name: name,
          message: message,
          invitation: form.dataset.invitation || "day",
        }),
      })
        .then(function (response) {
          return response.json().then(function (payload) {
            return { ok: response.ok, payload: payload };
          });
        })
        .then(function (result) {
          if (!result.ok || !result.payload.url) {
            throw new Error(
              (result.payload && result.payload.error) ||
                "Could not start donation."
            );
          }
          window.location.href = result.payload.url;
        })
        .catch(function (error) {
          setStatus(
            error && error.message
              ? error.message
              : "Something went wrong. Please try again.",
            true
          );
          if (submit) {
            submit.disabled = false;
            submit.textContent = "Donate";
          }
        });
    });
  })();
</script>
