intro: |
  Cogges Manor Farm is on Church Lane in Witney, a short walk from the town centre.
  Free parking is available on site, and guests are welcome to leave their cars overnight.

car:
  summary: Follow the brown Cogges signs (with a cart symbol) to the Cogges Hill Road car park. There is a short, signposted walk from the car park to the entrance.
  tip: Please do not drive down Church Lane for general parking — it is not a through road and has no public spaces.
  postcode: OX28 3FR
  google_maps_url: https://www.google.com/maps?ll=51.784246,-1.475788&z=15&t=m&hl=en-GB&gl=US&mapclient=embed&cid=8238071467645593535
